name: deploy

on:
  workflow_run:
    workflows: ["ci"]
    branches: ["main"]
    types: [completed]

jobs:
  deploy_api:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check Render deploy secret
        id: render
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Render deploy hook not configured; skipping API deploy."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger Render deploy
        if: steps.render.outputs.ready == 'true'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl --fail --silent --show-error -X POST "$RENDER_DEPLOY_HOOK_URL"

  deploy_web:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://furge:furge@127.0.0.1:5432/furge
    steps:
      - name: Check Cloudflare deployment secrets
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          CLOUDFLARE_R2_PUBLIC_BASE_URL: ${{ secrets.CLOUDFLARE_R2_PUBLIC_BASE_URL }}
          FFP_PUBLIC_API_BASE_URL: ${{ secrets.FFP_PUBLIC_API_BASE_URL }}
          FFP_PRODUCTION_API_BASE_URL: ${{ secrets.FFP_PRODUCTION_API_BASE_URL }}
          FFP_PRODUCTION_WEB_URL: ${{ secrets.FFP_PRODUCTION_WEB_URL }}
        run: |
          missing=false
          for key in \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_R2_ACCESS_KEY_ID \
            CLOUDFLARE_R2_SECRET_ACCESS_KEY \
            CLOUDFLARE_R2_BUCKET \
            CLOUDFLARE_R2_PUBLIC_BASE_URL \
            FFP_PUBLIC_API_BASE_URL \
            FFP_PRODUCTION_API_BASE_URL \
            FFP_PRODUCTION_WEB_URL; do
            if [ -z "${!key}" ]; then
              echo "Missing $key"
              missing=true
            fi
          done

          if [ "$missing" = true ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare deployment secrets are incomplete; skipping web deploy."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.cloudflare.outputs.ready == 'true'
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@v4
        if: steps.cloudflare.outputs.ready == 'true'
        with:
          node-version: 24
      - name: Enable Corepack
        if: steps.cloudflare.outputs.ready == 'true'
        run: corepack enable
      - name: Install dependencies
        if: steps.cloudflare.outputs.ready == 'true'
        run: corepack pnpm install --frozen-lockfile
      - name: Build web assets
        if: steps.cloudflare.outputs.ready == 'true'
        env:
          FFP_PUBLIC_API_BASE_URL: ${{ secrets.FFP_PUBLIC_API_BASE_URL }}
          FFP_PUBLIC_ASSET_BASE_URL: ${{ secrets.CLOUDFLARE_R2_PUBLIC_BASE_URL }}
        run: corepack pnpm --filter @ffp/web run build
      - name: Publish assets to Cloudflare R2
        if: steps.cloudflare.outputs.ready == 'true'
        env:
          CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          CLOUDFLARE_R2_PUBLIC_BASE_URL: ${{ secrets.CLOUDFLARE_R2_PUBLIC_BASE_URL }}
        run: node ./scripts/publish-assets.mjs
      - name: Deploy Cloudflare Pages site
        if: steps.cloudflare.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name furge-fabric-protocol-the-singularity
      - name: Verify production endpoints
        if: steps.cloudflare.outputs.ready == 'true'
        env:
          FFP_PRODUCTION_API_BASE_URL: ${{ secrets.FFP_PRODUCTION_API_BASE_URL }}
          FFP_PRODUCTION_WEB_URL: ${{ secrets.FFP_PRODUCTION_WEB_URL }}
        run: node ./scripts/verify-production.mjs
