services:
  postgres:
    image: postgres:16-alpine
    container_name: furge-postgres
    environment:
      POSTGRES_DB: furge
      POSTGRES_USER: furge
      POSTGRES_PASSWORD: furge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: furge-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data: